name: Build TermAI

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - release-aab
          - release-apk
          - debug-apk
        default: release-aab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Bootstrap Gradle Wrapper
        run: |
          # Download wrapper jar if not present in repo
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            echo "Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR" || \
            wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -O "$JAR"
            echo "Downloaded: $(ls -lh $JAR)"
          else
            echo "Wrapper jar already present"
          fi
          chmod +x gradlew

      - name: Copy web assets to Android assets folder
        run: |
          mkdir -p app/src/main/assets
          cp assets/index.html    app/src/main/assets/
          cp assets/terminal.css  app/src/main/assets/
          cp assets/terminal.js   app/src/main/assets/
          cp assets/ai-engine.js  app/src/main/assets/

      - name: Build Release AAB (Play Store)
        if: github.event.inputs.build_type == 'release-aab'
        run: ./gradlew bundleRelease --no-daemon

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release-apk'
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug-apk'
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload AAB (Play Store)
        if: github.event.inputs.build_type == 'release-aab'
        uses: actions/upload-artifact@v4
        with:
          name: TermAI-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release-apk'
        uses: actions/upload-artifact@v4
        with:
          name: TermAI-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug-apk'
        uses: actions/upload-artifact@v4
        with:
          name: TermAI-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Type: ${{ github.event.inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
