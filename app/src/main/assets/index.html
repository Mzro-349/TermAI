<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TermAI</title>
<link rel="stylesheet" href="terminal.css">
</head>
<body>

<div id="status-bar">
  <span id="app-title">⚡ TermAI</span>
  <span id="pwd-display">~</span>
  <button onclick="openSettings()">⚙️</button>
</div>

<div id="tabs-bar">
  <div id="tabs-list"></div>
  <button onclick="addTab()">＋</button>
</div>

<div id="terminal-output" onclick="focusInput()"></div>

<div id="input-row">
  <span id="prompt">~ ❯ </span>
  <input id="cmd-input" type="text"
    autocomplete="off" autocorrect="off"
    autocapitalize="none" spellcheck="false"
    placeholder="اكتب أمراً...">
</div>

<div id="toolbar">
  <button onclick="sendCtrl('c')">C-C</button>
  <button onclick="sendCtrl('l')">C-L</button>
  <button onclick="historyUp()">↑</button>
  <button onclick="historyDown()">↓</button>
  <button onclick="insertChar('|')">|</button>
  <button onclick="insertChar('/')">/ </button>
  <button onclick="insertChar('~')">~</button>
  <button onclick="insertChar('-')">-</button>
  <button onclick="insertChar('.')">.</button>
  <button onclick="insertChar('*')">*</button>
  <button onclick="sendTab()">Tab</button>
  <button class="ai-btn" onclick="openAI()">🤖 AI</button>
</div>

<div id="settings-overlay" class="hidden" onclick="closeSettingsBg(event)">
  <div id="settings-panel">
    <div id="settings-header">
      <h3>⚙️ الإعدادات</h3>
      <button onclick="closeSettings()">✕</button>
    </div>
    <div class="setting-row">
      <label>حجم الخط</label>
      <input type="range" min="10" max="22" value="14" id="set-fontsize"
        oninput="changeFontSize(this.value)">
      <span id="font-size-val">14</span>
    </div>
    <div class="setting-row">
      <label>الثيم</label>
      <select id="set-theme" onchange="applyTheme(this.value)">
        <option value="dark">Dark</option>
        <option value="matrix">Matrix</option>
        <option value="ocean">Ocean</option>
      </select>
    </div>
    <div class="setting-row col">
      <label>AI Endpoint</label>
      <input type="url" id="set-endpoint" placeholder="https://your-api.vercel.app/api/ai">
    </div>
    <div class="setting-row">
      <label>لغة AI</label>
      <select id="set-lang">
        <option value="ar">العربية</option>
        <option value="en">English</option>
      </select>
    </div>
    <button id="save-btn" onclick="saveSettings()">💾 حفظ</button>
  </div>
</div>

<div id="ai-panel" class="hidden">
  <div id="ai-header">
    <span>🤖 TermAI Assistant</span>
    <button onclick="closeAI()">✕</button>
  </div>
  <div id="ai-output"></div>
  <div id="ai-input-row">
    <input id="ai-input" type="text" placeholder="اسأل AI...">
    <button onclick="sendAI()">▶</button>
  </div>
</div>

<script src="terminal.js"></script>
</body>
</html>
