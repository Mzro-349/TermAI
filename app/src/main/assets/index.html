<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TermAI</title>
<link rel="stylesheet" href="xterm.css">
<link rel="stylesheet" href="terminal.css">
</head>
<body>

<!-- Status Bar -->
<div id="status-bar">
  <div id="status-left">
    <span id="app-icon">⚡</span>
    <span id="app-name">TermAI</span>
    <span id="ai-badge" class="badge-offline">AI</span>
  </div>
  <div id="status-right">
    <span id="pwd-display">~</span>
    <button class="icon-btn" onclick="toggleSleepMode()" title="Sleep Mode">🌙</button>
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
</div>

<!-- Tabs Bar -->
<div id="tabs-bar">
  <div id="tabs-list"></div>
  <button id="new-tab-btn" onclick="addTab()">＋</button>
</div>

<!-- Terminal Container -->
<div id="terminal-container">
  <div id="terminal"></div>
</div>

<!-- AI Panel -->
<div id="ai-panel" class="hidden">
  <div id="ai-panel-header">
    <div id="ai-panel-title">
      <span class="ai-icon">🤖</span>
      <span id="ai-panel-label">TermAI</span>
    </div>
    <button class="close-btn" onclick="closeAIPanel()">✕</button>
  </div>
  <div id="ai-content"></div>
  <div id="ai-actions"></div>
</div>

<!-- Keyboard Toolbar -->
<div id="keyboard-toolbar">
  <div id="toolbar-scroll">
    <button class="tk-btn" onclick="sendKey('\t')">Tab</button>
    <button class="tk-btn" onclick="sendCtrl('a')">C-A</button>
    <button class="tk-btn" onclick="sendCtrl('c')">C-C</button>
    <button class="tk-btn" onclick="sendCtrl('d')">C-D</button>
    <button class="tk-btn" onclick="sendCtrl('l')">C-L</button>
    <button class="tk-btn" onclick="sendCtrl('z')">C-Z</button>
    <button class="tk-btn" onclick="sendKey('\x1b[A')">↑</button>
    <button class="tk-btn" onclick="sendKey('\x1b[B')">↓</button>
    <button class="tk-btn" onclick="sendKey('\x1b[C')">→</button>
    <button class="tk-btn" onclick="sendKey('\x1b[D')">←</button>
    <button class="tk-btn tk-pipe">|</button>
    <button class="tk-btn tk-pipe">&amp;</button>
    <button class="tk-btn tk-pipe">;</button>
    <button class="tk-btn tk-pipe">~</button>
    <button class="tk-btn tk-pipe">/</button>
    <button class="tk-btn ai-tk-btn" onclick="quickAI()">🤖 AI</button>
  </div>
</div>

<!-- Sleep Mode -->
<div id="sleep-overlay" class="hidden" onclick="wakeUp()">
  <div id="sleep-clock"></div>
  <div id="sleep-date"></div>
  <div id="sleep-hint">tap to wake</div>
</div>

<!-- Settings Panel -->
<div id="settings-overlay" class="hidden" onclick="closeSettingsOnBg(event)">
  <div id="settings-panel">
    <div id="settings-header">
      <h3>⚙️ Settings</h3>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>

    <div class="settings-section">
      <div class="section-title">🎨 Appearance</div>
      <div class="setting-row">
        <label>Theme</label>
        <select id="set-theme" onchange="applyTheme(this.value)">
          <option value="dark">Dark Pro</option>
          <option value="matrix">Matrix</option>
          <option value="ocean">Ocean</option>
          <option value="hacker">Hacker Red</option>
          <option value="midnight">Midnight</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Font Size: <span id="font-size-val">14</span>px</label>
        <input type="range" min="10" max="22" value="14" id="set-fontsize" oninput="changeFontSize(this.value)">
      </div>
      <div class="setting-row">
        <label>Cursor Style</label>
        <select id="set-cursor" onchange="changeCursor(this.value)">
          <option value="block">Block</option>
          <option value="bar">Bar</option>
          <option value="underline">Underline</option>
        </select>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">🤖 AI Settings</div>
      <div class="setting-row">
        <label>AI Language</label>
        <select id="set-ai-lang" onchange="setAILang(this.value)">
          <option value="ar">العربية 🇸🇦</option>
          <option value="en">English 🇺🇸</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Auto-analyze errors</label>
        <label class="toggle">
          <input type="checkbox" id="set-auto-ai" checked onchange="toggleAutoAI(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <label>Security scanner</label>
        <label class="toggle">
          <input type="checkbox" id="set-security" checked onchange="toggleSecurity(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row col">
        <label>API Endpoint</label>
        <input type="text" id="set-endpoint" placeholder="https://your-app.vercel.app/api/ai" class="text-input">
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">⌨️ Terminal</div>
      <div class="setting-row">
        <label>Shell</label>
        <select id="set-shell">
          <option value="sh">sh</option>
          <option value="bash">bash</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Scrollback lines</label>
        <input type="number" id="set-scrollback" value="5000" min="100" max="50000" class="num-input">
      </div>
    </div>

    <div class="settings-section premium-section">
      <div class="section-title">💎 Premium</div>
      <div id="premium-status-display"></div>
      <button id="upgrade-btn" onclick="upgradeToPremium()">Upgrade to Premium</button>
    </div>

    <button id="save-settings-btn" onclick="saveSettings()">💾 Save Settings</button>
  </div>
</div>

<!-- Security Warning Modal -->
<div id="security-modal" class="hidden">
  <div id="security-card">
    <div id="security-icon">⚠️</div>
    <div id="security-title">Security Warning</div>
    <div id="security-message"></div>
    <div id="security-btns">
      <button id="sec-cancel" onclick="cancelDangerCmd()">Cancel</button>
      <button id="sec-proceed" onclick="proceedDangerCmd()">Proceed Anyway</button>
    </div>
  </div>
</div>

<script src="xterm.js"></script>
<script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://unpkg.com/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script src="ai-engine.js"></script>
<script src="terminal.js"></script>
</body>
</html>
