<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TermAI</title>
<link rel="stylesheet" href="xterm.css">
<link rel="stylesheet" href="terminal.css">
</head>
<body>

<!-- ══ Status Bar ══ -->
<input id="kb-input" type="text" 
  style="position:fixed;opacity:0;width:1px;height:1px;top:0;left:0;z-index:-1;border:none;outline:none;background:transparent"
  autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<div id="status-bar">
  <div id="status-left">
    <span id="app-icon">⚡</span>
    <span id="app-name">TermAI</span>
    <span id="ai-badge" class="badge badge-offline">AI</span>
    <span id="premium-badge" class="badge badge-premium hidden">PRO</span>
  </div>
  <div id="status-right">
    <span id="pwd-display">~</span>
    <button class="icon-btn" id="btn-sleep"    onclick="toggleSleepMode()" title="Sleep">🌙</button>
    <button class="icon-btn" id="btn-settings" onclick="openSettings()"    title="Settings">⚙️</button>
  </div>
</div>

<!-- ══ Tabs Bar ══ -->
<div id="tabs-bar">
  <div id="tabs-list"></div>
  <button id="new-tab-btn" onclick="addTab()" title="New Tab">＋</button>
</div>

<!-- ══ Terminal ══ -->
<div id="terminal-container">
  <div id="terminal"></div>
</div>

<!-- ══ Keyboard Toolbar ══ -->
<div id="keyboard-toolbar">
  <div id="toolbar-scroll">
    <button class="tk-btn" onclick="sendKey('\t')">Tab</button>
    <button class="tk-btn" onclick="sendCtrl('a')">C-A</button>
    <button class="tk-btn" onclick="sendCtrl('c')">C-C</button>
    <button class="tk-btn" onclick="sendCtrl('d')">C-D</button>
    <button class="tk-btn" onclick="sendCtrl('l')">C-L</button>
    <button class="tk-btn" onclick="sendCtrl('z')">C-Z</button>
    <button class="tk-btn" onclick="sendKey('\x1b[A')">↑</button>
    <button class="tk-btn" onclick="sendKey('\x1b[B')">↓</button>
    <button class="tk-btn" onclick="sendKey('\x1b[C')">→</button>
    <button class="tk-btn" onclick="sendKey('\x1b[D')">←</button>
    <button class="tk-btn tk-sym" onclick="insertChar('|')">|</button>
    <button class="tk-btn tk-sym" onclick="insertChar('&')">&amp;</button>
    <button class="tk-btn tk-sym" onclick="insertChar(';')">;</button>
    <button class="tk-btn tk-sym" onclick="insertChar('~')">~</button>
    <button class="tk-btn tk-sym" onclick="insertChar('/')">/ </button>
    <button class="tk-btn tk-sym" onclick="insertChar('>')">></button>
    <button class="tk-btn tk-sym" onclick="insertChar('<')">&lt;</button>
    <button class="tk-btn ai-btn" onclick="quickAI()">🤖 AI</button>
  </div>
</div>

<!-- ══ AI Panel ══ -->
<div id="ai-panel" class="hidden">
  <div id="ai-panel-header">
    <div id="ai-panel-title">
      <span class="ai-dot"></span>
      <span id="ai-panel-label">TermAI</span>
    </div>
    <div id="ai-panel-actions-top">
      <button class="icon-btn" onclick="closeAIPanel()">✕</button>
    </div>
  </div>
  <div id="ai-content"></div>
  <div id="ai-actions"></div>
</div>

<!-- ══ Sleep Overlay ══ -->
<div id="sleep-overlay" class="hidden" onclick="wakeUp()">
  <div id="sleep-clock"></div>
  <div id="sleep-date"></div>
  <div id="sleep-hint">tap to wake</div>
</div>

<!-- ══ Settings Sheet ══ -->
<div id="settings-overlay" class="hidden" onclick="closeSettingsOnBg(event)">
  <div id="settings-panel">
    <div class="sheet-handle"></div>
    <div id="settings-header">
      <h3>Settings</h3>
      <button class="icon-btn" onclick="closeSettings()">✕</button>
    </div>

    <!-- Appearance -->
    <div class="settings-section">
      <div class="section-title">🎨 Appearance</div>
      <div class="setting-row">
        <label>Theme</label>
        <select id="set-theme" onchange="applyTheme(this.value)">
          <option value="dark">Dark Pro</option>
          <option value="matrix">Matrix</option>
          <option value="ocean">Ocean</option>
          <option value="hacker">Hacker Red</option>
          <option value="midnight">Midnight</option>
          <option value="solarized">Solarized</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Font Size <span id="font-size-val" class="val-badge">14</span></label>
        <input type="range" min="10" max="22" value="14" id="set-fontsize" oninput="changeFontSize(this.value)">
      </div>
      <div class="setting-row">
        <label>Cursor</label>
        <select id="set-cursor" onchange="changeCursor(this.value)">
          <option value="block">Block</option>
          <option value="bar">Bar</option>
          <option value="underline">Underline</option>
        </select>
      </div>
    </div>

    <!-- Terminal -->
    <div class="settings-section">
      <div class="section-title">⌨️ Terminal</div>
      <div class="setting-row">
        <label>Shell</label>
        <select id="set-shell">
          <option value="sh">sh</option>
          <option value="bash">bash</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Scrollback</label>
        <input type="number" id="set-scrollback" value="5000" min="500" max="50000" class="num-input">
      </div>
      <div class="setting-row">
        <label>Bell</label>
        <label class="toggle">
          <input type="checkbox" id="set-bell">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- AI -->
    <div class="settings-section">
      <div class="section-title">🤖 AI</div>
      <div class="setting-row">
        <label>Language</label>
        <select id="set-ai-lang">
          <option value="ar">العربية 🇸🇦</option>
          <option value="en">English 🇺🇸</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Auto-analyze errors</label>
        <label class="toggle">
          <input type="checkbox" id="set-auto-ai" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <label>Security scanner</label>
        <label class="toggle">
          <input type="checkbox" id="set-security" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row col">
        <label>API Endpoint</label>
        <input type="url" id="set-endpoint" placeholder="https://your-app.vercel.app/api/ai" class="text-input" autocomplete="off">
      </div>
      <button class="test-btn" onclick="testAIConnection()">🔗 Test Connection</button>
    </div>



    <!-- About -->
    <div class="settings-section">
      <div class="section-title">ℹ️ About</div>
      <div class="setting-row"><label>Version</label><span class="val-badge">2.0.0</span></div>
      <div class="setting-row"><label>Build</label><span class="val-badge">Release</span></div>
      <div class="setting-row">
        <label>Security Audit Log</label>
        <button class="mini-btn" onclick="viewSecurityLog()">View</button>
      </div>
      <div class="setting-row">
        <label>Clear History</label>
        <button class="mini-btn danger" onclick="clearHistory()">Clear</button>
      </div>
    </div>

    <button id="save-settings-btn" onclick="saveSettings()">💾 Save Settings</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- ══ Security Modal ══ -->
<div id="security-modal" class="hidden">
  <div id="security-card">
    <div id="security-icon">⚠️</div>
    <div id="security-title"></div>
    <div id="security-risk-badge"></div>
    <div id="security-message"></div>
    <div id="security-detail"></div>
    <div id="security-btns">
      <button id="sec-cancel"  onclick="cancelDangerCmd()">Cancel</button>
      <button id="sec-proceed" onclick="proceedDangerCmd()">Run Anyway</button>
    </div>
  </div>
</div>

<!-- ══ Toast container ══ -->
<div id="toast-container"></div>

<script src="xterm.js"></script>
<script src="xterm-addon-fit.js"></script>
<script src="xterm-addon-web-links.js"></script>
<script src="ai-engine.js"></script>
<script src="terminal.js"></script>
</body>
</html>
